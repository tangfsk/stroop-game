steps:
  # 1. 使用 Buildpacks 自動編譯並封裝
  - name: 'gcr.io/k8s-skaffold/pack'
    args: [
      'build', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/lucky-draw/stroop-mind-gym:$COMMIT_SHA',
      '--builder', 'gcr.io/buildpacks/builder:v1'
    ]

  # 2. 推送映像檔
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push', 
      'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/lucky-draw/stroop-mind-gym:$COMMIT_SHA'
    ]

  # 3. 部署到 Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'stroop-mind-gym',
      '--image', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/lucky-draw/stroop-mind-gym:$COMMIT_SHA',
      '--region', 'asia-southeast1'
    ]
