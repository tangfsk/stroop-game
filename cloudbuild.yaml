steps:
  # 1. 構建 Docker 映像檔
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/stroop-game/stroop:$COMMIT_SHA', '.']

  # 2. 推送映像檔
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/stroop-game/stroop:$COMMIT_SHA']

  # 3. 部署到 Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: ['run', 'deploy', 'stroop-game', '--image', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/stroop-game/stroop:$COMMIT_SHA', '--region', 'asia-southeast1', '--allow-unauthenticated']
